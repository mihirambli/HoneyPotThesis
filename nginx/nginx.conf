worker_processes auto;
error_log /usr/local/openresty/nginx/logs/error.log info;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;

    lua_shared_dict wadm_state 10m;

    init_by_lua_block {
        local cjson = require "cjson"

        local config_path = "/etc/openresty/config.json"
        local file, err = io.open(config_path, "r")
        if not file then
            ngx.log(ngx.ERR, "WADM: failed to open config file: ", err)
            return
        end

        local content = file:read("*a")
        file:close()

        local ok, config = pcall(cjson.decode, content)
        if not ok then
            ngx.log(ngx.ERR, "WADM: failed to parse config JSON: ", config)
            return
        end

        wadm_config = config
        ngx.log(ngx.NOTICE, "WADM: configuration loaded successfully")
    }

    upstream backend {
        server backend:80;
    }

    server {
        listen 80;
        server_name _;

        location / {
            access_by_lua_block {
                if not wadm_config or not wadm_config.honeytokens then
                    return
                end

                local comments = wadm_config.honeytokens.html_comments
                if not comments then
                    return
                end

                local triggers = {}
                for _, token in ipairs(comments) do
                    if token.trigger_keyword and token.trigger_keyword ~= "" then
                        triggers[#triggers + 1] = token.trigger_keyword
                    end
                end

                if #triggers == 0 then
                    return
                end

                local ip = ngx.var.remote_addr
                local wadm = ngx.shared.wadm_state
                local detected = false

                -- Inspect URI query parameters
                local uri_args = ngx.req.get_uri_args()
                local dirty_uri = false

                for key, val in pairs(uri_args) do
                    local vals = type(val) == "table" and val or { val }
                    for _, v in ipairs(vals) do
                        local v_str = tostring(v)
                        for _, keyword in ipairs(triggers) do
                            if string.find(v_str, keyword, 1, true)
                               or string.find(key, keyword, 1, true) then
                                ngx.log(ngx.WARN,
                                    "WADM ALERT: honeytoken triggered by ", ip,
                                    " — keyword '", keyword,
                                    "' found in URI arg '", key, "=", v_str, "'")
                                detected = true
                                uri_args[key] = nil
                                dirty_uri = true
                            end
                        end
                    end
                end

                if dirty_uri then
                    ngx.req.set_uri_args(uri_args)
                end

                -- Inspect POST body parameters
                ngx.req.read_body()
                local post_args, err = ngx.req.get_post_args()

                if post_args then
                    local dirty_post = false

                    for key, val in pairs(post_args) do
                        local vals = type(val) == "table" and val or { val }
                        for _, v in ipairs(vals) do
                            local v_str = tostring(v)
                            for _, keyword in ipairs(triggers) do
                                if string.find(v_str, keyword, 1, true)
                                   or string.find(key, keyword, 1, true) then
                                    ngx.log(ngx.WARN,
                                        "WADM ALERT: honeytoken triggered by ", ip,
                                        " — keyword '", keyword,
                                        "' found in POST arg '", key, "=", v_str, "'")
                                    detected = true
                                    post_args[key] = nil
                                    dirty_post = true
                                end
                            end
                        end
                    end

                    if dirty_post then
                        local parts = {}
                        for k, v in pairs(post_args) do
                            local vs = type(v) == "table" and v or { v }
                            for _, sv in ipairs(vs) do
                                parts[#parts + 1] = ngx.escape_uri(k)
                                    .. "=" .. ngx.escape_uri(sv)
                            end
                        end
                        ngx.req.set_body_data(table.concat(parts, "&"))
                    end
                else
                    local body_data = ngx.req.get_body_data()
                    if body_data then
                        for _, keyword in ipairs(triggers) do
                            if string.find(body_data, keyword, 1, true) then
                                ngx.log(ngx.WARN,
                                    "WADM ALERT: honeytoken triggered by ", ip,
                                    " — keyword '", keyword,
                                    "' found in request body")
                                detected = true
                            end
                        end
                    end
                end

                if detected then
                    wadm:set(ip, true, 86400)
                    ngx.log(ngx.WARN,
                        "WADM ALERT: attacker IP ", ip, " recorded in wadm_state")
                end
            }

            header_filter_by_lua_block {
                local ct = ngx.header["Content-Type"] or ""
                if ngx.re.find(ct, "text/html", "ijo") then
                    ngx.header.content_length = nil
                end
            }

            body_filter_by_lua_block {
                local ct = ngx.header["Content-Type"] or ""
                if not ngx.re.find(ct, "text/html", "ijo") then
                    return
                end

                if not wadm_config or not wadm_config.honeytokens then
                    return
                end

                local comments = wadm_config.honeytokens.html_comments
                if not comments then
                    return
                end

                local uri = ngx.var.uri

                local to_inject = {}
                for _, token in ipairs(comments) do
                    for _, pattern in ipairs(token.paths) do
                        if pattern == "/*" or pattern == uri then
                            to_inject[#to_inject + 1] = token.comment_value
                            break
                        end
                    end
                end

                if #to_inject == 0 then
                    return
                end

                local ctx = ngx.ctx
                if not ctx.body_chunks then
                    ctx.body_chunks = {}
                end

                if ngx.arg[1] ~= "" then
                    ctx.body_chunks[#ctx.body_chunks + 1] = ngx.arg[1]
                end
                ngx.arg[1] = ""

                if ngx.arg[2] then
                    local body = table.concat(ctx.body_chunks)
                    local injection = table.concat(to_inject, "\n")

                    local new_body, n = ngx.re.sub(body, "</body>", injection .. "\n</body>", "io")
                    if not n or n == 0 then
                        new_body = body .. injection
                    end

                    ngx.arg[1] = new_body
                end
            }

            proxy_pass http://backend;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
