services:
  backend:
    image: nginx:alpine
    volumes:
      - ./backend/index.html:/usr/share/nginx/html/index.html:ro
      - ./backend/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - honeypot

  openresty:
    image: openresty/openresty:latest
    profiles:
      - openresty
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro
      - ./config.json:/etc/openresty/config.json:ro
    depends_on:
      - backend
    networks:
      - honeypot

  envoy:
    image: envoyproxy/envoy:v1.30-latest
    profiles:
      - envoy
    ports:
      - "8081:8080"
    volumes:
      - ./envoy/envoy.yaml:/etc/envoy/envoy.yaml:ro
      - ./config.json:/etc/envoy/config.json:ro
      - ./envoy_scripts:/etc/envoy/scripts:ro
    depends_on:
      - backend
    networks:
      - honeypot

  rust-builder:
    build:
      context: ./wasm-filter
      dockerfile: Dockerfile
    profiles:
      - wasm
    volumes:
      - wasm_output:/output

  envoy-wasm:
    image: envoyproxy/envoy:v1.30-latest
    profiles:
      - wasm
    ports:
      - "8082:8080"
    volumes:
      - ./envoy-wasm/envoy-wasm.yaml:/etc/envoy/envoy-wasm.yaml:ro
      - ./config.json:/etc/envoy/config.json:ro
      - ./envoy-wasm/entrypoint.sh:/entrypoint.sh:ro
      - wasm_output:/etc/envoy/wasm:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    depends_on:
      rust-builder:
        condition: service_completed_successfully
      backend:
        condition: service_started
    networks:
      - honeypot

networks:
  honeypot:
    driver: bridge

volumes:
  wasm_output:
