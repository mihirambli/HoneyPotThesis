# Compose file: pick ONE edge via profile (openresty | envoy | wasm | apache). backend always defined for upstream.
services:
  # Origin only: static HTML; no honeytoken logic here — all WADM runs in the edge you enable.
  backend:
    image: nginx:alpine
    volumes:
      - ./backend/index.html:/usr/share/nginx/html/index.html:ro
      - ./backend/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - honeypot

  # Edge A — OpenResty. Host port 8080 → container 80. Mounts repo nginx.conf + config.json paths used by Lua.
  openresty:
    image: openresty/openresty:latest
    profiles:
      - openresty
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro
      - ./config.json:/etc/openresty/config.json:ro
    depends_on:
      - backend
    networks:
      - honeypot

  # Edge B — Envoy with Lua filter. Host 8081 → Envoy listener 8080. Scripts + config must stay in sync paths with envoy.yaml.
  envoy:
    image: envoyproxy/envoy:v1.30-latest
    profiles:
      - envoy
    ports:
      - "8081:8080"
    volumes:
      - ./envoy/envoy.yaml:/etc/envoy/envoy.yaml:ro
      - ./config.json:/etc/envoy/config.json:ro
      - ./envoy_scripts:/etc/envoy/scripts:ro
    depends_on:
      - backend
    networks:
      - honeypot

  # One-shot build: produces filter.wasm on shared volume for envoy-wasm (profile wasm only).
  rust-builder:
    build:
      context: ./wasm-filter
      dockerfile: Dockerfile
    profiles:
      - wasm
    volumes:
      - wasm_output:/output

  # Edge C — Envoy + WASM. Waits for rust-builder artifact and merges config into YAML at startup (entrypoint.sh).
  envoy-wasm:
    image: envoyproxy/envoy:v1.30-latest
    profiles:
      - wasm
    ports:
      - "8082:8080"
    volumes:
      - ./envoy-wasm/envoy-wasm.yaml:/etc/envoy/envoy-wasm.yaml:ro
      - ./config.json:/etc/envoy/config.json:ro
      - ./envoy-wasm/entrypoint.sh:/entrypoint.sh:ro
      - wasm_output:/etc/envoy/wasm:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    depends_on:
      rust-builder:
        condition: service_completed_successfully
      backend:
        condition: service_started
    networks:
      - honeypot

  # Edge D — Apache httpd + mod_lua. Host port 8083 → container 80. Lua hooks read config.json and json.lua from mounted paths.
  apache:
    image: httpd:2.4-alpine
    profiles:
      - apache
    ports:
      - "8083:80"
    volumes:
      - ./apache_scripts:/usr/local/apache2/scripts/:ro
      - ./config.json:/usr/local/apache2/conf/config.json:ro
      - ./httpd.conf:/usr/local/apache2/conf/httpd.conf:ro
    depends_on:
      - backend
    networks:
      - honeypot

  # External load generator. Profile `loadtest` keeps it opt-in; combine with an edge profile,
  # e.g. `docker compose --profile openresty --profile loadtest up --abort-on-container-exit`.
  # TARGET picks which in-network edge to hit (each listens on a different container port).
  load-tester:
    image: grafana/k6:latest
    profiles:
      - loadtest
    volumes:
      - ./benchmarks:/scripts:ro
    environment:
      TARGET: ${TARGET:-http://openresty:80}
      TRIGGER_KEYWORD: ${TRIGGER_KEYWORD:-internal-admin.example.com}
      K6_VUS: ${K6_VUS:-5}
      K6_DURATION: ${K6_DURATION:-30s}
      K6_START_DELAY: ${K6_START_DELAY:-5s}
    command: ["run", "/scripts/test.js"]
    networks:
      - honeypot

# Shared bridge so service DNS names (backend, openresty, envoy) resolve.
networks:
  honeypot:
    driver: bridge

# Named volume: rust-builder writes /output/filter.wasm; envoy-wasm reads /etc/envoy/wasm/filter.wasm.
volumes:
  wasm_output:
