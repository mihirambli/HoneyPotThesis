# httpd.conf — Apache edge (profile: apache). Minimal config for mod_lua WADM + reverse proxy to backend:80.
# Phase 1: LuaHookAccessChecker (detect.lua) inspects and cleans query strings before ProxyPass.
# Phase 2: SetOutputFilter (inject.lua) injects HTML honeytoken comments into responses.

ServerRoot "/usr/local/apache2"
Listen 80

User  daemon
Group daemon

ServerName localhost

ErrorLog  /proc/self/fd/2
LogFormat "%h \"%r\" %>s %b" common
CustomLog /proc/self/fd/1 common

# ── Core modules required for a functional httpd process ─────────────────────
LoadModule mpm_event_module    modules/mod_mpm_event.so
LoadModule unixd_module        modules/mod_unixd.so
LoadModule authz_core_module   modules/mod_authz_core.so
LoadModule dir_module          modules/mod_dir.so
LoadModule mime_module         modules/mod_mime.so
LoadModule log_config_module   modules/mod_log_config.so

# ── mod_headers: strip Content-Length on filtered responses so body size change is safe ─
LoadModule headers_module      modules/mod_headers.so

# ── Reverse proxy ─────────────────────────────────────────────────────────────
LoadModule proxy_module        modules/mod_proxy.so
LoadModule proxy_http_module   modules/mod_proxy_http.so

# ── mod_lua: WADM hooks ────────────────────────────────────────────────────────
LoadModule lua_module          modules/mod_lua.so

# ── mod_filter: required for AddOutputFilterByType ────────────────────────────
LoadModule filter_module       modules/mod_filter.so

# ── Lua runtime ────────────────────────────────────────────────────────────────
LuaPackagePath "/usr/local/apache2/scripts/?.lua"
# thread scope: module-level variables (config, keyword) are loaded once per worker thread.
LuaScope thread

# Register the output filter name at server scope (required by SetOutputFilter below).
LuaOutputFilter WADM_INJECT /usr/local/apache2/scripts/inject.lua handle_inject

<VirtualHost *:80>
    ServerName localhost

    # Phase 1 — Detection & cleaning (request).
    LuaHookAccessChecker /usr/local/apache2/scripts/detect.lua handle_detect early

    # Phase 2 — Reverse proxy to origin.
    ProxyPreserveHost On
    ProxyPass        / http://backend:80/
    ProxyPassReverse / http://backend:80/

    # Phase 3 — Injection (response).
    # SetOutputFilter applies the filter unconditionally; inject.lua guards on content-type internally.
    # Header always unset removes Content-Length so the body size change from injection is safe.
    # "always" is required to affect proxied responses (plain "unset" only touches Apache-generated ones).
    SetOutputFilter WADM_INJECT
    Header always unset Content-Length
</VirtualHost>
