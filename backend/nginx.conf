worker_processes auto;
error_log /var/log/nginx/error.log info;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Extra fields vs default combined log — useful when debugging request sizes to the dummy origin.
    log_format body_log '$remote_addr - [$time_local] "$request" '
                        '$status $body_bytes_sent '
                        'req_content_length=$content_length';

    access_log /var/log/nginx/access.log body_log;

    server {
        listen 80;
        server_name _;

        # Static honeypot "app" only; WADM injection/detection happens in the edge container, not here.
        location / {
            root /usr/share/nginx/html;
            index index.html;
        }
    }
}
