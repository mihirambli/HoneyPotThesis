# Envoy static config for profile `envoy`: listener 8080 inside container (mapped to host 8081 in compose).
static_resources:
  listeners:
    - name: listener_0
      address:
        socket_address:
          address: 0.0.0.0
          # Container listen port — compose maps host 8081 here.
          port_value: 8080
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_http
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: backend_vhost
                      domains: ["*"]
                      routes:
                        # Catch-all: every path goes to backend_cluster (WADM logic is in HTTP filters, not routes).
                        - match:
                            prefix: "/"
                          route:
                            cluster: backend_cluster
                http_filters:
                  # Lua runs BEFORE router: can change :path/body then router forwards to cluster.
                  - name: envoy.filters.http.lua
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
                      default_source_code:
                        # Must match volume mount in docker-compose (./envoy_scripts → /etc/envoy/scripts).
                        filename: /etc/envoy/scripts/injection.lua
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    - name: backend_cluster
      connect_timeout: 5s
      type: STRICT_DNS
      load_assignment:
        cluster_name: backend_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      # Docker Compose service name for the nginx:alpine origin.
                      address: backend
                      port_value: 80
